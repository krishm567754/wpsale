name: Shri Laxmi Bot Runner

on:
  push:
    branches: [ main ]
  workflow_dispatch: 
  schedule:
    - cron: '0 */6 * * *' # Auto-restart every 6 hours

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Tells GitHub to use Node 24

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # This is the step that fixes the "Node 20" warning for the environment
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' 

      - name: Install Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Install Dependencies
        run: npm install

      - name: Run WhatsApp Bot
        run: node index.js
        env:
          FIREBASE_URL: ${{ secrets.FIREBASE_URL }}
