name: WhatsApp Bot Runner

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 */6 * * *' # Auto-restart every 6 hours
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      
      - name: Install Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Install Deps
        run: npm install

      - name: Start Bot
        run: node index.js
