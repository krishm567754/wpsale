name: Shri Laxmi Bot Runner

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Allows you to start the bot manually from your phone
  schedule:
    - cron: '0 */5 * * *' # Auto-restarts every 5 hours to stay alive

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Fixes the Node.js deprecation warning

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # CRITICAL: Installs the browser required to generate the pairing code
      - name: Install Google Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Install Dependencies
        run: npm install

      - name: Run WhatsApp Bot
        run: node index.js
        env:
          FIREBASE_URL: ${{ secrets.FIREBASE_URL }}
